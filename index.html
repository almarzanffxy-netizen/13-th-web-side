<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git || Hub || Sign In</title>
    <link rel="shortcut icon" href="./english-janala-resources/assets/logo.png" type="image/x-icon">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- tailwind + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="bg-white p-8 rounded-2xl shadow-md w-110  flex flex-col items-center text-center space-y-4">
        <div class="flex flex-col items-center">
            <img src="B13-A5-Github-Issue-Tracker/assets/github-logo.png" alt="" class="w-12 mb-2">
            <h1 class="text-xl font-bold">GitHub Issues Tracker</h1>
            <p class="text-gray-500 text-sm">Sign in to manage your issues</p>
        </div>
        <div class="w-full flex flex-col items-start space-y-2">
            <label class="text-sm font-medium">Username</label>
            <input id="UserNameValue" type="text" placeholder="Enter Username"
                class="w-full px-3 py-2 border rounded-lg text-start focus:outline-none focus:ring-2 focus:ring-blue-400">
            <span class="text-xs text-[#4A00FF]">Default: admin</span>
            <label class="text-sm font-medium mt-2">Password</label>
            <input id="InputPasswordValue" type="password" placeholder="Password"
                class="w-full px-3 py-2 border rounded-lg text-start focus:outline-none focus:ring-2 focus:ring-blue-400">
            <span class="text-xs text-[#4A00FF]">Default: admin123</span>
        </div>
       <button id="btn-to-page" class="w-full block text-center bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600">
           Sign In
       </button>
        <div class="flex items-center w-full">
          <div class="flex-grow h-px bg-gray-300"></div>
             <span class="mx-3 text-gray-400 text-sm">OR</span>
          <div class="flex-grow h-px bg-gray-300"></div>
       </div>
       <div>
        <span class="text-gray-300">Demo Credentials:</span>
       </div>
        <div class="text-sm shadow-sm w-70">
            <h3><span class="font-bold">Username:</span> admin <br><span class="font-bold">Password:</span> admin123</h3>
        </div>
    </div>
</div>
    <script src="indexlogin.js"></script>
</body>
</html>
